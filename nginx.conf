# ── nginx reverse proxy configuration ─────────────────────────────────────
# Place in the project root. Uncomment the nginx service in
# docker-compose.prod.yml to enable.

events {
  worker_connections 1024;
}

http {
  # ── Upstreams ──────────────────────────────────────────────────────────
  upstream api {
    server api:4000;
  }
  upstream web {
    server web:3000;
  }

  # ── HTTP → HTTPS redirect (uncomment when SSL is configured) ───────────
  # server {
  #   listen 80;
  #   server_name research-workbench.example.com;
  #   return 301 https://$host$request_uri;
  # }

  # ── HTTPS server (uncomment + add SSL certs) ───────────────────────────
  server {
    listen 80;
    # listen 443 ssl http2;
    server_name localhost;

    # SSL (uncomment with certs)
    # ssl_certificate /etc/nginx/ssl/cert.pem;
    # ssl_certificate_key /etc/nginx/ssl/key.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Web app ──────────────────────────────────────────────────────
    location / {
      proxy_pass http://web;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;

      # Timeouts
      proxy_connect_timeout 60s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;
    }

    # ── API ───────────────────────────────────────────────────────────
    location /api/ {
      rewrite ^/api/(.*) /$1 break;
      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Longer timeout for SSE
      proxy_connect_timeout 60s;
      proxy_send_timeout 60s;
      proxy_read_timeout 3600s;
    }

    # ── Static assets cache ───────────────────────────────────────────
    location /_next/static {
      proxy_pass http://web;
      expires 365d;
      add_header Cache-Control "public, immutable";
    }

    location /static {
      proxy_pass http://web;
      expires 365d;
      add_header Cache-Control "public, immutable";
    }

    # ── Health checks ─────────────────────────────────────────────────
    location /health {
      proxy_pass http://api;
      access_log off;
      return 200 "healthy\n";
    }
  }
}
