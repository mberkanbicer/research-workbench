      type: object
      required: [title, goal, initialIdea]
      properties:
        title: { type: string, minLength: 1 }
        goal: { type: string, minLength: 1 }
        initialIdea: { type: string, minLength: 1 }

    UpdateProjectRequest:
      type: object
      properties:
        title: { type: string }
        goal: { type: string }
        currentSynthesis: { type: string }
        status:
          type: string
          enum: [active, paused, completed, archived]

    StartRunRequest:
      type: object
      required: [modelIds]
      properties:
        modelIds:
          type: array
          minItems: 1
          items: { type: string, format: uuid }
        maxRounds:
          type: integer
          minimum: 1
          maximum: 10
          default: 3
        loopMode:
          type: string
          enum: [standard, self_improving, adversarial]
          default: standard
          description: standard runs the fixed pipeline; self_improving enables meta-prompt fixes; adversarial adds counter-evidence probing
        searchProvider:
          type: string
          enum: [mock, searxng, serpapi, web, manual]
          description: Optional per-run search provider override
        mode:
          type: string
          enum: [real, manual, mixed]
          deprecated: true
          description: Legacy field; use loopMode instead

