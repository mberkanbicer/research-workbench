  # ── Idea Versions Compare ───────────────────────────────────────────────

  /idea-versions/compare:
    get:
      tags: [IdeaVersions]
      summary: Compare two idea versions
      parameters:
        - name: v1
          in: query
          required: true
          schema: { type: string }
        - name: v2
          in: query
          required: true
