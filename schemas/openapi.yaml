openapi: 3.1.0
info:
  title: Evidence-Grounded Research Workbench API
  version: 0.2.0
  description: Full MVP API contract for the evidence-grounded multi-model long-horizon research workbench.
servers:
  - url: http://localhost:4000
    description: Local Fastify API

tags:
  - name: Projects
  - name: Runs
  - name: IdeaVersions
  - name: Claims
  - name: Evidence
  - name: Models
  - name: Tasks
  - name: Decisions
  - name: Export
  - name: Auth
  - name: Feedback
  - name: Providers
  - name: Annotations
  - name: EvaluationCriteria
  - name: Realtime
  - name: Graphs
  - name: LiteratureReviews
  - name: Prompts
  - name: Templates
  - name: Settings
  - name: ApiKeys

paths:
  /health:
    get:
      summary: Health check
      tags: [Projects]
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /ready:
    get:
      summary: Readiness check
      tags: [Projects]
      responses:
        '200':
          description: API is ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ready

  # ── Auth ──────────────────────────────────────────────────────────────────

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                name:
                  type: string
      responses:
        '201':
          description: User registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      user: { type: object }
                      token: { type: string }
        '409':
          description: Email already registered

  /auth/login:
    post:
      tags: [Auth]
      summary: Authenticate and get token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      user: { type: object }
                      token: { type: string }
        '401':
          description: Invalid credentials

  /auth/logout:
    post:
      tags: [Auth]
      summary: Invalidate session token
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logged out
        '401':
          description: Not authenticated

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user info
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id: { type: string }
                      email: { type: string }
                      name: { type: string }
        '401':
          description: Not authenticated

  # ── Providers ──────────────────────────────────────────────────────────────

  /providers/status:
    get:
      tags: [Providers]
      summary: Get available model/search provider status
      responses:
        '200':
          description: Provider status
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      searchProvider: { type: string }
                      searchReady: { type: boolean }
                      modelsAvailable: { type: integer }

  /projects:
    get:
      summary: List projects
      tags: [Projects]
      responses:
        '200':
          description: Project list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectListResponse'
    post:
      summary: Create project with initial idea version
      tags: [Projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Created project and initial idea version
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateProjectResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /projects/{projectId}:
    get:
      summary: Get project dashboard state
      tags: [Projects]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Project dashboard state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDashboardResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      summary: Update project metadata
      tags: [Projects]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
      responses:
        '200':
          description: Updated project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete project and all related data
      tags: [Projects]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Project deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      success:
                        type: boolean
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/archive:
    post:
      summary: Archive project
      tags: [Projects]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Archived project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'

  /projects/{projectId}/runs:
    post:
      summary: Start deliberation run
      tags: [Runs]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartRunRequest'
      responses:
        '201':
          description: Run queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /runs/{runId}:
    get:
      summary: Get run status and recent events
      tags: [Runs]
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: Run status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunStatusResponse'

  /runs/{runId}/events:
    get:
      summary: Server-Sent Events for run progress
      tags: [Runs]
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string

  /runs/{runId}/events/history:
    get:
      summary: Get historical run events
      tags: [Runs]
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: Array of past run events
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/RunEvent'

  /runs/{runId}/cancel:
    post:
      summary: Cancel active run
      tags: [Runs]
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: Cancellation requested
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunResponse'

  /runs/{runId}/retry:
    post:
      summary: Retry a failed run
      tags: [Runs]
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        '200':
          description: Job retried
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      success:
                        type: boolean
                      message:
                        type: string
        '404':
          description: Job not found

  /projects/{projectId}/runs/latest:
    get:
      tags: [Runs]
      summary: Get the latest run for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string, format: uuid }
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Latest run
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: object }
        '404':
          description: No runs found

  /runs/{runId}/context-manifests:
    get:
      tags: [Runs]
      summary: List context manifests recorded during a run's project
      parameters:
        - name: runId
          in: path
          required: true
          schema: { type: string, format: uuid }
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Context manifests
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ContextManifest'
        '404':
          description: Run not found

  /runs/{runId}/metrics:
    get:
      tags: [Runs]
      summary: Get self-improving loop metrics (quality reports, iterations)
      parameters:
        - name: runId
          in: path
          required: true
          schema: { type: string, format: uuid }
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Run metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      runId: { type: string, format: uuid }
                      status: { type: string, enum: [running, completed] }
                      iterations:
                        type: array
                        items:
                          type: object
                          properties:
                            iteration: { type: integer }
                            correctiveActions: { type: integer }
                            qualityIssues: { type: integer }
                            isFinal: { type: boolean }
                      stageQuality:
                        type: object
                        additionalProperties:
                          type: object
                          properties:
                            avg: { type: number }
                            count: { type: integer }
                            failures: { type: integer }
                      totalQualityReports: { type: integer }
        '404':
          description: Run not found or not a self_improving run

  /projects/{projectId}/idea-versions:
    get:
      summary: List idea versions
      tags: [IdeaVersions]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Idea versions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdeaVersionListResponse'
    post:
      summary: Create manual idea version
      tags: [IdeaVersions]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIdeaVersionRequest'
      responses:
        '201':
          description: Created idea version
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdeaVersionResponse'

  /idea-versions/{ideaVersionId}:
    get:
      summary: Get idea version with claims and linked critiques
      tags: [IdeaVersions]
      parameters:
        - $ref: '#/components/parameters/IdeaVersionId'
      responses:
        '200':
          description: Idea version detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdeaVersionDetailResponse'

  /idea-versions/{ideaVersionId}/extract-claims:
    post:
      summary: Extract claims for idea version
      tags: [Claims]
      parameters:
        - $ref: '#/components/parameters/IdeaVersionId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExtractClaimsRequest'
      responses:
        '201':
          description: Claims extracted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClaimListResponse'

  /projects/{projectId}/claims:
    get:
      summary: List claims
      tags: [Claims]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Claims
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClaimListResponse'

  /claims/{claimId}:
    get:
      summary: Get claim by ID
      tags: [Claims]
      parameters:
        - $ref: '#/components/parameters/ClaimId'
      responses:
        '200':
          description: Claim
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClaimResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      summary: Update claim metadata or status
      tags: [Claims]
      parameters:
        - $ref: '#/components/parameters/ClaimId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateClaimRequest'
      responses:
        '200':
          description: Updated claim
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClaimResponse'

  /projects/{projectId}/evidence:
    get:
      summary: List evidence
      tags: [Evidence]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Evidence list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvidenceListResponse'
    post:
      summary: Add manual evidence
      tags: [Evidence]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEvidenceRequest'
      responses:
        '201':
          description: Evidence created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvidenceResponse'

  /evidence/{evidenceId}:
    get:
      summary: Get evidence by ID
      tags: [Evidence]
      parameters:
        - $ref: '#/components/parameters/EvidenceId'
      responses:
        '200':
          description: Evidence
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvidenceResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      summary: Update evidence fields or status
      tags: [Evidence]
      parameters:
        - $ref: '#/components/parameters/EvidenceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEvidenceRequest'
      responses:
        '200':
          description: Evidence updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvidenceResponse'

  /claims/{claimId}/search-evidence:
    post:
      summary: Search supporting evidence for claim
      tags: [Evidence]
      parameters:
        - $ref: '#/components/parameters/ClaimId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchEvidenceRequest'
      responses:
        '201':
          description: Evidence search completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvidenceListResponse'

  /claims/{claimId}/search-counter-evidence:
    post:
      summary: Search counter-evidence for claim
      tags: [Evidence]
      parameters:
        - $ref: '#/components/parameters/ClaimId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchEvidenceRequest'
      responses:
        '201':
          description: Counter-evidence search completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvidenceListResponse'

  /evidence/{evidenceId}/assess:
    post:
      summary: Run evidence assessment by selected models
      tags: [Evidence]
      parameters:
        - $ref: '#/components/parameters/EvidenceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssessEvidenceRequest'
      responses:
        '201':
          description: Evidence assessments created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvidenceAssessmentListResponse'

  /projects/{projectId}/evidence/assess-pending:
    post:
      tags: [Evidence]
      summary: Assess all pending evidence for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string, format: uuid }
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Pending evidence assessed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      assessed: { type: integer }
        '404':
          description: Project not found

  /projects/{projectId}/evidence/find-counter-evidence:
    post:
      tags: [Evidence]
      summary: Search for counter-evidence for project claims
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string, format: uuid }
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Counter-evidence search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      counterEvidenceFound: { type: integer }
        '404':
          description: Project not found

  /models:
    get:
      summary: List model configs without secrets
      tags: [Models]
      responses:
        '200':
          description: Models
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelListResponse'
    post:
      summary: Create model config
      tags: [Models]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateModelRequest'
      responses:
        '201':
          description: Created model config
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelResponse'

  /models/{modelId}:
    get:
      summary: Get model config by ID
      tags: [Models]
      parameters:
        - $ref: '#/components/parameters/ModelId'
      responses:
        '200':
          description: Model config (without secrets)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      summary: Update model config
      tags: [Models]
      parameters:
        - $ref: '#/components/parameters/ModelId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateModelRequest'
      responses:
        '200':
          description: Updated model config
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelResponse'
    delete:
      summary: Disable or delete model config
      tags: [Models]
      parameters:
        - $ref: '#/components/parameters/ModelId'
      responses:
        '204':
          description: Deleted or disabled

  /models/{modelId}/test:
    post:
      summary: Test model config
      tags: [Models]
      parameters:
        - $ref: '#/components/parameters/ModelId'
      responses:
        '200':
          description: Test result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelTestResponse'

  /projects/{projectId}/tasks:
    get:
      summary: List research tasks
      tags: [Tasks]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Research tasks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchTaskListResponse'

  /tasks/{taskId}:
    patch:
      summary: Update research task status or metadata
      tags: [Tasks]
      parameters:
        - $ref: '#/components/parameters/TaskId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateResearchTaskRequest'
      responses:
        '200':
          description: Updated task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchTaskResponse'

  /tasks/{taskId}/run:
    post:
      summary: Run a single research task
      tags: [Tasks]
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: Task executed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchTaskResponse'

  /projects/{projectId}/decisions:
    get:
      summary: List decision records
      tags: [Decisions]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Decisions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DecisionListResponse'
    post:
      summary: Record a manual decision
      tags: [Decisions]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decisionStatus, decisionText, ideaVersionId]
              properties:
                decisionStatus:
                  type: string
                  enum: [full_consensus, qualified_consensus, no_consensus, insufficient_evidence, needs_external_validation]
                decisionText:
                  type: string
                ideaVersionId:
                  type: string
      responses:
        '201':
          description: Decision created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DecisionResponse'

  /decisions/{decisionId}:
    get:
      summary: Get decision record
      tags: [Decisions]
      parameters:
        - $ref: '#/components/parameters/DecisionId'
      responses:
        '200':
          description: Decision detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DecisionResponse'

  /projects/{projectId}/export/json:
    get:
      summary: Export project as JSON
      tags: [Export]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: JSON export
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /projects/{projectId}/export/markdown:
    get:
      summary: Export project as Markdown
      tags: [Export]
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Markdown export
          content:
            text/markdown:
              schema:
                type: string

  # ── Feedback ──────────────────────────────────────────────────────────────

  /feedback:
    post:
      tags: [Feedback]
      summary: Submit feedback for a project or entity
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [projectId, targetType, targetId, feedbackType, message]
              properties:
                projectId: { type: string, format: uuid }
                targetType:
                  type: string
                  enum: [claim, evidence, critique, decision, run]
                targetId: { type: string }
                feedbackType:
                  type: string
                  enum: [helpful, incorrect, unclear, needs_work, other]
                message: { type: string }
      responses:
        '201':
          description: Feedback created
        '401':
          description: Not authenticated

  /feedback/{projectId}:
    get:
      tags: [Feedback]
      summary: List feedback for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string, format: uuid }
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Feedback list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { type: object }
        '401':
          description: Not authenticated

  /feedback/{projectId}/summary:
    get:
      tags: [Feedback]
      summary: Get feedback summary for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema: { type: string, format: uuid }
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Feedback summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      total: { type: integer }
                      helpful: { type: integer }
                      incorrect: { type: integer }
                      unclear: { type: integer }
                      needsWork: { type: integer }
        '401':
          description: Not authenticated

  # ── Annotations ────────────────────────────────────────────────────────────

  /projects/{projectId}/annotations:
    get:
