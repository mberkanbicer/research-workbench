components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ProjectId:
      name: projectId
      in: path
      required: true
      schema: { type: string }
    RunId:
      name: runId
      in: path
      required: true
      schema: { type: string }
    IdeaVersionId:
      name: ideaVersionId
      in: path
      required: true
      schema: { type: string }
    ClaimId:
      name: claimId
      in: path
      required: true
      schema: { type: string }
    EvidenceId:
      name: evidenceId
      in: path
      required: true
      schema: { type: string }
    ModelId:
      name: modelId
      in: path
      required: true
      schema: { type: string }
    TaskId:
      name: taskId
      in: path
      required: true
      schema: { type: string }
    DecisionId:
      name: decisionId
      in: path
      required: true
      schema: { type: string }

  responses:
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    HealthResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [ok]
          properties:
            ok: { type: boolean }

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }
            details: { type: object, additionalProperties: true }

    Project:
      type: object
      required: [id, title, goal, status, createdAt, updatedAt]
      properties:
        id: { type: string }
        title: { type: string }
        goal: { type: string }
        currentSynthesis: { type: string, nullable: true }
        status:
          type: string
          enum: [active, paused, completed, archived]
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    IdeaVersion:
      type: object
      required: [id, projectId, versionNumber, title, description, status, createdAt]
      properties:
        id: { type: string }
        projectId: { type: string }
        versionNumber: { type: integer }
        title: { type: string }
        description: { type: string }
        status:
          type: string
          enum: [draft, under_review, needs_revision, accepted, accepted_with_reservations, rejected, superseded]
        changesFromPrevious:
          type: array
          items: { type: string }
          nullable: true
        createdBecauseOfCritiqueIds:
          type: array
          items: { type: string }
          nullable: true
        createdAt: { type: string, format: date-time }

    Claim:
      type: object
      required: [id, projectId, ideaVersionId, text, type, requiresEvidence, criticality, status, createdAt]
      properties:
        id: { type: string }
        projectId: { type: string }
        ideaVersionId: { type: string }
        text: { type: string }
        type:
          type: string
          enum: [technical, product, market, business, legal, ux, research, risk, assumption]
        requiresEvidence: { type: boolean }
        criticality:
          type: string
          enum: [low, medium, high, blocking]
        status:
          type: string
          enum: [unverified, supported, partially_supported, contradicted, unsupported, needs_external_validation]
        confidence: { type: number, nullable: true }
        createdAt: { type: string, format: date-time }

    Evidence:
      type: object
      required: [id, projectId, title, sourceType, reliability, relevance, status, stalenessRisk, createdAt]
      properties:
        id: { type: string }
        projectId: { type: string }
        claimId: { type: string, nullable: true }
        discoveredByModelId: { type: string, nullable: true }
        sourceUrl: { type: string, nullable: true }
        title: { type: string }
        publisher: { type: string, nullable: true }
        publishedAt: { type: string, format: date-time, nullable: true }
        retrievedAt: { type: string, format: date-time }
        sourceType:
          type: string
          enum: [official, academic, government, company, news, benchmark, blog, forum, user_input, unknown]
        excerpt: { type: string, nullable: true }
        summary: { type: string, nullable: true }
        rawContentRef: { type: string, nullable: true }
        reliability:
          type: string
          enum: [pending, high, medium, low, unusable]
        relevance:
          type: string
          enum: [pending, direct, indirect, weak, irrelevant]
        status:
          type: string
          enum: [pending_review, accepted, accepted_with_caution, rejected, irrelevant, needs_better_source]
        stalenessRisk:
          type: string
          enum: [low, medium, high]
        createdAt: { type: string, format: date-time }

    EvidenceAssessment:
      type: object
      required: [id, evidenceId, reviewerModelId, reliability, relevance, interpretationVerdict, notes, finalVerdict, createdAt]
      properties:
        id: { type: string }
        evidenceId: { type: string }
        reviewerModelId: { type: string }
        reliability:
          type: string
          enum: [high, medium, low, unusable]
        relevance:
          type: string
          enum: [direct, indirect, weak, irrelevant]
        interpretationVerdict:
          type: string
          enum: [correctly_used, overstated, misinterpreted, out_of_context, insufficient]
        detectedProblems:
          type: array
          items: { type: string }
          nullable: true
        notes: { type: string }
        finalVerdict:
          type: string
          enum: [accept, accept_with_caution, reject, irrelevant, needs_better_source]
        createdAt: { type: string, format: date-time }

    ModelConfig:
      type: object
      required: [id, name, provider, model, contextWindow, preferredMaxInputRatio, outputReserveRatio, defaultTemperature, supportsStreaming, supportsJsonMode, isEnabled, createdAt, updatedAt]
      properties:
        id: { type: string }
        name: { type: string }
        provider:
          type: string
          enum: [mock, openrouter, ollama, openai_compatible]
        model: { type: string }
        baseUrl: { type: string, nullable: true }
        apiKeyRef: { type: string, nullable: true }
        contextWindow: { type: integer }
        preferredMaxInputRatio: { type: number }
        outputReserveRatio: { type: number }
        defaultTemperature: { type: number }
        supportsStreaming: { type: boolean }
        supportsJsonMode: { type: boolean }
        isEnabled: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    ResearchTask:
      type: object
      required: [id, projectId, title, objective, role, priority, status, createdAt, updatedAt]
      properties:
        id: { type: string }
        projectId: { type: string }
        claimId: { type: string, nullable: true }
        ideaVersionId: { type: string, nullable: true }
        title: { type: string }
        objective: { type: string }
        role:
          type: string
          enum: [researcher, skeptic, source_auditor, inference_auditor, reviewer, critic, synthesizer, decision_auditor]
        priority:
          type: string
          enum: [low, medium, high, critical]
        status:
          type: string
          enum: [todo, running, done, blocked, cancelled, failed]
        assignedModelId: { type: string, nullable: true }
        outputIds:
          type: array
          items: { type: string }
          nullable: true
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    DecisionRecord:
      type: object
      required: [id, projectId, ideaVersionId, decisionStatus, decisionText, createdAt]
      properties:
        id: { type: string }
        projectId: { type: string }
        ideaVersionId: { type: string }
        decisionStatus:
          type: string
          enum: [full_consensus, qualified_consensus, no_consensus, insufficient_evidence, needs_external_validation, max_rounds_reached]
        decisionText: { type: string }
        whyGood:
          type: array
          items: { type: string }
        whyBad:
          type: array
          items: { type: string }
        knownWeaknesses:
          type: array
          items: { type: string }
        acceptedEvidenceIds:
          type: array
          items: { type: string }
        counterEvidenceIds:
          type: array
          items: { type: string }
        resolvedCritiqueIds:
          type: array
          items: { type: string }
        unresolvedRisks:
          type: array
          items: { type: string }
        modelFinalVotes:
          type: array
          items:
            $ref: '#/components/schemas/ModelVote'
        reopenConditions:
          type: array
          items: { type: string }
        nextActions:
          type: array
          items: { type: string }
        createdAt: { type: string, format: date-time }

    ModelVote:
      type: object
      required: [modelId, vote, reason]
      properties:
        modelId: { type: string }
        vote:
          type: string
          enum: [accept, accept_with_reservations, reject, abstain, needs_more_evidence]
        reason: { type: string }
        confidence: { type: number, nullable: true }
        reservations:
          type: array
          items: { type: string }

    Run:
      type: object
      required: [id, projectId, status, createdAt]
      properties:
        id: { type: string }
        projectId: { type: string }
        status:
          type: string
          enum: [queued, running, completed, failed, cancelled]
        currentRound: { type: integer, nullable: true }
        createdAt: { type: string, format: date-time }
        completedAt: { type: string, format: date-time, nullable: true }

    RunEvent:
      type: object
      required: [id, runId, projectId, type, createdAt]
      properties:
        id: { type: string }
        runId: { type: string }
        projectId: { type: string }
        type:
          type: string
          enum: [run.started, round.started, task.created, task.started, task.completed, model.call.started, model.call.completed, evidence.added, evidence.assessed, critique.created, critique.responded, idea.revised, consensus.checked, decision.created, run.completed, run.failed, run.cancelled]
        payload:
          type: object
          additionalProperties: true
          nullable: true
        createdAt: { type: string, format: date-time }

