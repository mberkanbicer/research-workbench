# ── GitHub Actions CI/CD ────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm -C packages/shared typecheck
      - run: pnpm -C packages/model-gateway typecheck
      - run: pnpm -C apps/api typecheck
      - run: pnpm -C apps/web typecheck
      - run: pnpm -C apps/web typecheck:tests

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: research
          POSTGRES_PASSWORD: research
          POSTGRES_DB: research_workbench
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6380:6379

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm -C apps/api db:generate
        env:
          DATABASE_URL: postgresql://research:research@localhost:5433/research_workbench?schema=public

      - name: Run Prisma migrations
        run: pnpm -C apps/api db:migrate
        env:
          DATABASE_URL: postgresql://research:research@localhost:5433/research_workbench?schema=public

      - name: Run tests
        run: pnpm -r test
        env:
          DATABASE_URL: postgresql://research:research@localhost:5433/research_workbench?schema=public
          REDIS_URL: redis://localhost:6380
          SEARCH_PROVIDER: mock

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build API
        run: pnpm -C apps/api build
        env:
          NODE_ENV: production

      - name: Build Web
        run: pnpm -C apps/web build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_API_URL: http://localhost:4000

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [lint-and-typecheck, test, build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.api
          push: false
          tags: research-workbench/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.web
          push: false
          tags: research-workbench/web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
